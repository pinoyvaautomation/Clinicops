<style>
  .password-toggle-wrap {
    position: relative;
  }
  .password-toggle-wrap input[type="password"],
  .password-toggle-wrap input[type="text"] {
    padding-right: 52px !important;
  }
  .password-toggle {
    position: absolute;
    top: 50%;
    right: 12px;
    transform: translateY(-50%);
    width: 32px;
    height: 32px;
    padding: 0;
    border: none;
    border-radius: 999px;
    background: transparent;
    color: rgba(11, 11, 11, 0.68);
    display: inline-flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    transition: color 0.16s ease, background 0.16s ease;
  }
  .password-toggle:hover,
  .password-toggle:focus-visible,
  .password-toggle[aria-pressed="true"] {
    color: var(--login-primary, var(--signup-primary, var(--shell-primary, var(--patient-primary, var(--page-primary, #00488a)))));
    background: rgba(0, 72, 138, 0.08);
    outline: none;
  }
  .password-toggle svg {
    width: 18px;
    height: 18px;
    display: block;
  }
</style>
<script>
  (function() {
    const eyeIcon = [
      '<svg viewBox="0 0 24 24" aria-hidden="true" focusable="false">',
      '<path fill="currentColor" d="M12 5c5.4 0 9.43 3.53 10.86 6.56a1.1 1.1 0 0 1 0 .88C21.43 15.47 17.4 19 12 19S2.57 15.47 1.14 12.44a1.1 1.1 0 0 1 0-.88C2.57 8.53 6.6 5 12 5Zm0 2C7.73 7 4.49 9.66 3.27 12 4.49 14.34 7.73 17 12 17s7.51-2.66 8.73-5C19.51 9.66 16.27 7 12 7Zm0 1.75A3.25 3.25 0 1 1 8.75 12 3.25 3.25 0 0 1 12 8.75Zm0 2A1.25 1.25 0 1 0 13.25 12 1.25 1.25 0 0 0 12 10.75Z"/>',
      '</svg>',
    ].join('');
    const eyeOffIcon = [
      '<svg viewBox="0 0 24 24" aria-hidden="true" focusable="false">',
      '<path fill="currentColor" d="m3.28 2.22 18.5 18.5-1.06 1.06-3.16-3.16A12.5 12.5 0 0 1 12 20c-5.4 0-9.43-3.53-10.86-6.56a1.1 1.1 0 0 1 0-.88A13.57 13.57 0 0 1 6.1 7.5L2.22 3.28l1.06-1.06Zm4.31 6.44A10.97 10.97 0 0 0 3.27 12C4.49 14.34 7.73 17 12 17a10.2 10.2 0 0 0 3.93-.76l-1.76-1.76A3.24 3.24 0 0 1 9.52 9.83L7.59 7.66Zm3.41 3.41A1.25 1.25 0 0 0 11.93 13l-1.99-1.99A1.25 1.25 0 0 0 11 12.07Zm1-.82 2.84 2.84A3.24 3.24 0 0 0 12 8.75c-.21 0-.41.02-.61.06L12 9.43a1.25 1.25 0 0 1 0 1.82ZM12 5c5.4 0 9.43 3.53 10.86 6.56a1.1 1.1 0 0 1 0 .88 13.32 13.32 0 0 1-3.8 4.4L17.6 15.4A11.06 11.06 0 0 0 20.73 12C19.51 9.66 16.27 7 12 7a10.7 10.7 0 0 0-2.43.27L7.93 5.63A12.68 12.68 0 0 1 12 5Z"/>',
      '</svg>',
    ].join('');

    function enhancePasswordInput(input) {
      if (!input || input.dataset.passwordToggleInitialized === 'true') {
        return;
      }
      const wrapper = document.createElement('div');
      wrapper.className = 'password-toggle-wrap';
      input.dataset.passwordToggleInitialized = 'true';
      input.parentNode.insertBefore(wrapper, input);
      wrapper.appendChild(input);

      const button = document.createElement('button');
      button.type = 'button';
      button.className = 'password-toggle';
      button.setAttribute('aria-label', 'Show password');
      button.setAttribute('aria-pressed', 'false');
      button.innerHTML = eyeIcon;

      button.addEventListener('click', function() {
        const shouldReveal = input.type === 'password';
        input.type = shouldReveal ? 'text' : 'password';
        button.setAttribute('aria-pressed', shouldReveal ? 'true' : 'false');
        button.setAttribute('aria-label', shouldReveal ? 'Hide password' : 'Show password');
        button.innerHTML = shouldReveal ? eyeOffIcon : eyeIcon;
      });

      wrapper.appendChild(button);
    }

    function initPasswordToggles() {
      document.querySelectorAll('input[type="password"]').forEach(enhancePasswordInput);
    }

    if (document.readyState === 'loading') {
      document.addEventListener('DOMContentLoaded', initPasswordToggles);
    } else {
      initPasswordToggles();
    }
  })();
</script>
