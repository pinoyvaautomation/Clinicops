<style>
  .public-nav {
    background: #fff;
    border-bottom: 1px solid #e5e7eb;
    position: sticky;
    top: 0;
    z-index: 1000;
  }
  .public-nav__inner {
    max-width: 1040px;
    margin: 0 auto;
    padding: 16px 24px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 16px;
    flex-wrap: wrap;
  }
  .public-brand {
    display: flex;
    align-items: center;
    gap: 12px;
    font-weight: 700;
    color: var(--brand, #1d4ed8);
  }
  .public-brand img {
    height: 34px;
    width: auto;
  }
  .public-nav__actions {
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .public-nav__links {
    display: flex;
    align-items: center;
    gap: 16px;
    font-size: 14px;
    flex-wrap: wrap;
  }
  .public-nav__links a {
    color: var(--brand, #1d4ed8);
    text-decoration: none;
  }
  .public-nav__links a:hover { text-decoration: underline; }
  .public-nav__links .cta {
    background: var(--brand, #1d4ed8);
    color: #fff;
    padding: 8px 12px;
    border-radius: 6px;
    text-decoration: none;
  }
  .public-nav__links .cta:hover { text-decoration: none; opacity: 0.92; }
  .public-nav__toggle {
    width: 40px;
    height: 40px;
    border-radius: 10px;
    border: 1px solid #e5e7eb;
    background: #ffffff;
    display: none;
    align-items: center;
    justify-content: center;
    cursor: pointer;
  }
  .public-nav__toggle span {
    display: block;
    width: 18px;
    height: 2px;
    background: var(--brand, #1d4ed8);
    border-radius: 2px;
    position: relative;
  }
  .public-nav__toggle span::before,
  .public-nav__toggle span::after {
    content: '';
    position: absolute;
    left: 0;
    width: 18px;
    height: 2px;
    background: var(--brand, #1d4ed8);
    border-radius: 2px;
  }
  .public-nav__toggle span::before { top: -6px; }
  .public-nav__toggle span::after { top: 6px; }
  .public-nav__overlay {
    position: fixed;
    inset: 0;
    background: rgba(15, 23, 42, 0.35);
    display: none;
    z-index: 1400;
  }
  .public-nav__overlay.open { display: block; }
  @media (max-width: 900px) {
    .public-nav__links {
      position: fixed;
      top: 0;
      left: -280px;
      right: auto;
      height: 100%;
      width: 260px;
      background: #ffffff;
      flex-direction: column;
      align-items: flex-start;
      gap: 12px;
      padding: 88px 16px 20px;
      box-shadow: 12px 0 24px rgba(15, 23, 42, 0.15);
      transition: left 0.2s ease;
      z-index: 1500;
    }
    .public-nav__links.open { left: 0; }
    .public-nav__links .cta { width: 100%; text-align: center; }
    .public-nav__toggle { display: inline-flex; }
  }
</style>
<nav class="public-nav" style="--brand: {{ public_brand_color|default:'#1d4ed8' }};">
  <div class="public-nav__inner">
    <div class="public-brand">
      {% if public_logo_url %}
        <img src="{{ public_logo_url }}" alt="{{ public_brand_name|default:'ClinicOps' }} logo" onerror="this.remove()">
      {% endif %}
      <span>{{ public_brand_name|default:"ClinicOps" }}</span>
    </div>
    <div class="public-nav__actions">
      <button type="button" class="public-nav__toggle" id="public-nav-toggle" aria-label="Open menu" aria-expanded="false">
        <span></span>
      </button>
      <div class="public-nav__links" id="public-nav-links">
        {% if clinic and clinic.slug %}
          <a href="{% url 'patient-signup-slug' clinic.slug %}">Create account</a>
        {% endif %}
        <a class="cta" href="{% url 'login' %}">Sign in</a>
      </div>
    </div>
  </div>
</nav>
<div class="public-nav__overlay" id="public-nav-overlay" aria-hidden="true"></div>

<script>
  (function() {
    const toggle = document.getElementById('public-nav-toggle');
    const links = document.getElementById('public-nav-links');
    const overlay = document.getElementById('public-nav-overlay');
    if (!toggle || !links || !overlay) return;

    function openMenu() {
      links.classList.add('open');
      overlay.classList.add('open');
      overlay.setAttribute('aria-hidden', 'false');
      toggle.setAttribute('aria-expanded', 'true');
    }
    function closeMenu() {
      links.classList.remove('open');
      overlay.classList.remove('open');
      overlay.setAttribute('aria-hidden', 'true');
      toggle.setAttribute('aria-expanded', 'false');
    }

    toggle.addEventListener('click', function() {
      if (links.classList.contains('open')) {
        closeMenu();
      } else {
        openMenu();
      }
    });
    overlay.addEventListener('click', closeMenu);
    links.querySelectorAll('a').forEach(function(link) {
      link.addEventListener('click', closeMenu);
    });
    window.addEventListener('resize', function() {
      if (window.innerWidth > 900) {
        closeMenu();
      }
    });
  })();
</script>
