<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <title>Resend verification</title>
    <style>
      body { font-family: Arial, sans-serif; margin: 48px; color: #1f2937; }
      form { max-width: 360px; }
      label { display: block; margin-top: 12px; }
      input { width: 100%; padding: 8px; margin-top: 4px; }
      button { margin-top: 16px; padding: 8px 12px; }
      .muted { color: #6b7280; }
      .success { color: #047857; }
    </style>
  </head>
  <body>
    <h1>Resend verification</h1>
    <p class="muted">Enter your email and we’ll send a new verification link.</p>

    {% if sent %}
      <p class="success">If an inactive account exists for that email, a verification link has been sent.</p>
    {% endif %}

    <form method="post">
      {% csrf_token %}
      {{ form.email.label_tag }}
      {{ form.email }}
      {{ form.email.errors }}
      <button type="submit">Resend verification</button>
    </form>
  </body>
</html>
