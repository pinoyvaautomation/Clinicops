<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <title>ClinicOps Login</title>
    <style>
      body { font-family: Arial, sans-serif; margin: 48px; color: #1f2937; }
      form { max-width: 320px; }
      label { display: block; margin-top: 12px; }
      input { width: 100%; padding: 8px; margin-top: 4px; }
      button { margin-top: 16px; padding: 8px 12px; }
      .error { color: #b91c1c; }
    </style>
  </head>
  <body>
    <h1>Sign in</h1>
    {% if form.errors %}
      <p class="error">Invalid username or password.</p>
    {% endif %}
    <form method="post" action="{% url 'login' %}">
      {% csrf_token %}
      <label for="id_username">Username</label>
      <input type="text" name="username" id="id_username" required>

      <label for="id_password">Password</label>
      <input type="password" name="password" id="id_password" required>

      <input type="hidden" name="next" value="{{ next }}">
      <button type="submit">Sign in</button>
    </form>
    <p><a href="{% url 'password_reset' %}">Forgot your password?</a></p>
    <p><a href="{% url 'resend-verification' %}">Resend verification email</a></p>
  </body>
</html>
