<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <title>Check your email</title>
    <style>
      :root { --brand: {{ public_brand_color|default:"#0f5132" }}; }
      * { box-sizing: border-box; }
      body {
        font-family: Arial, sans-serif;
        margin: 0;
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        background: #f3f4f6;
        color: #1f2937;
      }
      .page {
        flex: 1;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 24px;
      }
      .card {
        width: 100%;
        max-width: 440px;
        background: #fff;
        border: 1px solid #e5e7eb;
        border-radius: 10px;
        overflow: hidden;
        box-shadow: 0 12px 28px rgba(15, 23, 42, 0.12);
      }
      .card-header {
        background: var(--brand);
        color: #fff;
        padding: 18px 20px;
        font-size: 20px;
        font-weight: 700;
        display: flex;
        align-items: center;
        gap: 12px;
      }
      .card-header img {
        height: 28px;
        width: auto;
      }
      .card-header.logo-broken img { display: none; }
      .card-header.logo-broken .logo-fallback { display: inline; }
      .logo-fallback { display: none; font-weight: 700; }
      .card-body { padding: 22px 20px 24px; }
      .muted { color: #6b7280; font-size: 14px; margin-top: 6px; }
    </style>
  </head>
  <body>
    {% include "core/partials/public_nav.html" %}
    <main class="page">
      <div class="card">
        <div class="card-header">
          {% if public_logo_url %}
            <img src="{{ public_logo_url }}" alt="{{ public_brand_name|default:'ClinicOps' }} logo" onerror="this.closest('.card-header').classList.add('logo-broken')">
            <span class="logo-fallback">{{ public_brand_name|default:"ClinicOps" }}</span>
          {% endif %}
          <span>Check your email</span>
        </div>
        <div class="card-body">
          <p class="muted">If an account exists with that email, a reset link was sent.</p>
        </div>
      </div>
    </main>
    {% include "core/partials/site_footer.html" %}
  </body>
</html>
