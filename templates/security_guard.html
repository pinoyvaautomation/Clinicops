<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{{ title }}</title>
    <style>
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 24px;
        font-family: Arial, sans-serif;
        color: #0f172a;
        background:
          radial-gradient(circle at top left, rgba(15, 81, 50, 0.12), transparent 30%),
          linear-gradient(180deg, #f8fbff 0%, #eef6f4 100%);
      }
      .panel {
        width: min(560px, 100%);
        padding: 32px;
        border-radius: 24px;
        background: rgba(255, 255, 255, 0.96);
        border: 1px solid rgba(148, 163, 184, 0.22);
        box-shadow: 0 18px 44px rgba(148, 163, 184, 0.14);
      }
      .status {
        display: inline-flex;
        min-height: 34px;
        align-items: center;
        padding: 7px 12px;
        border-radius: 999px;
        background: rgba(15, 81, 50, 0.1);
        color: #0f5132;
        font-size: 13px;
        font-weight: 700;
      }
      h1 {
        margin: 16px 0 10px;
        font-size: 2rem;
        line-height: 1.1;
      }
      p {
        margin: 0;
        color: #475569;
        line-height: 1.7;
      }
    </style>
  </head>
  <body>
    <article class="panel">
      <div class="status">Security guard {{ status_code }}</div>
      <h1>{{ title }}</h1>
      <p>{{ message }}</p>
    </article>
  </body>
</html>
